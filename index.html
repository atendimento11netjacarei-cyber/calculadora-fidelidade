<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Calculadora de Fidelidade</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose-50: #fff0f5;
    --rose-100: #ffe0ec;
    --rose-200: #ffc6d9;
    --rose-300: #ff96b8;
    --rose-400: #ff5c8a;
    --rose-500: #f72b6a;
    --rose-600: #dc1254;
    --rose-700: #b80d44;
    --rose-800: #890d35;
    --rose-900: #5e0a24;
    --green-soft: #d4f4e8;
    --green-main: #0d7a56;
    --text-primary: #1a0a10;
    --text-secondary: #8a6070;
    --bg: #fff6f9;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 48px 16px 64px;
    background-image:
      radial-gradient(ellipse 80% 60% at 50% -10%, #ffd6e640 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 80%, #ffc6d930 0%, transparent 50%);
  }

  .wrapper {
    width: 100%;
    max-width: 460px;
  }

  /* — Header — */
  .header {
    text-align: center;
    margin-bottom: 36px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    background: var(--rose-100);
    color: var(--rose-600);
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border-radius: 99px;
    margin-bottom: 16px;
  }

  .badge svg { width: 13px; height: 13px; }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    color: var(--text-primary);
    line-height: 1.18;
    margin-bottom: 8px;
  }

  h1 em {
    font-style: italic;
    color: var(--rose-500);
  }

  .subtitle {
    font-size: 14px;
    color: var(--text-secondary);
    font-weight: 300;
  }

  /* — Card — */
  .card {
    background: #fff;
    border: 1px solid var(--rose-100);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 4px 32px #f72b6a0d, 0 1px 4px #f72b6a08;
    margin-bottom: 16px;
    animation: fadeUp 0.4s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* — Fields — */
  .fields {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }

  .field label {
    display: block;
    font-size: 11.5px;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--text-secondary);
    margin-bottom: 8px;
  }

  .field input[type="date"] {
    width: 100%;
    padding: 11px 14px;
    border: 1.5px solid var(--rose-100);
    border-radius: 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    color: var(--text-primary);
    background: var(--rose-50);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    cursor: pointer;
  }

  .field input[type="date"]:focus {
    border-color: var(--rose-400);
    box-shadow: 0 0 0 3px #f72b6a18;
    background: #fff;
  }

  /* — Button — */
  .btn {
    width: 100%;
    padding: 14px;
    background: var(--rose-500);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.18s, transform 0.12s, box-shadow 0.18s;
    box-shadow: 0 4px 18px #f72b6a30;
    letter-spacing: 0.01em;
  }

  .btn:hover { background: var(--rose-600); box-shadow: 0 6px 24px #f72b6a40; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }

  .btn svg { width: 17px; height: 17px; }

  /* — Divider — */
  .sep { border: none; border-top: 1px solid var(--rose-100); margin: 24px 0; }

  /* — Progress section — */
  .prog-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .prog-title {
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .pill {
    font-size: 11.5px;
    font-weight: 500;
    padding: 4px 12px;
    border-radius: 99px;
    letter-spacing: 0.02em;
  }

  .pill--open   { background: var(--rose-100); color: var(--rose-600); }
  .pill--done   { background: var(--green-soft); color: var(--green-main); }

  .track {
    background: var(--rose-100);
    border-radius: 99px;
    height: 9px;
    overflow: hidden;
    margin-bottom: 8px;
  }

  .fill {
    height: 9px;
    border-radius: 99px;
    background: var(--rose-400);
    transition: width 0.6s cubic-bezier(.22,1,.36,1);
  }

  .fill--done { background: var(--green-main); }

  .prog-foot {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    color: var(--text-secondary);
  }

  /* — Metrics row — */
  .metrics {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 16px;
    animation: fadeUp 0.45s ease both;
    animation-delay: 0.05s;
  }

  .metric {
    background: #fff;
    border: 1px solid var(--rose-100);
    border-radius: 16px;
    padding: 14px 12px;
    text-align: center;
  }

  .metric-val {
    font-family: 'DM Serif Display', serif;
    font-size: 26px;
    color: var(--text-primary);
    line-height: 1;
    margin-bottom: 5px;
  }

  .metric-lbl {
    font-size: 11px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-weight: 500;
  }

  /* — Multa card — */
  .multa-card {
    animation: fadeUp 0.5s ease both;
    animation-delay: 0.1s;
  }

  .multa-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .multa-lbl {
    font-size: 11.5px;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 500;
    margin-bottom: 6px;
  }

  .multa-val {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    line-height: 1;
  }

  .multa-val--danger { color: var(--rose-500); }
  .multa-val--ok     { color: var(--green-main); }

  .multa-icon {
    width: 52px;
    height: 52px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .multa-icon--danger { background: #ffeaf0; }
  .multa-icon--ok     { background: var(--green-soft); }

  .multa-desc {
    font-size: 13px;
    color: var(--text-secondary);
    line-height: 1.65;
    font-weight: 300;
  }
</style>
</head>
<body>
<div class="wrapper">

  <div class="header">
    <div class="badge">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M8 1.5L9.5 6H14L10.25 8.75L11.5 13L8 10.25L4.5 13L5.75 8.75L2 6H6.5L8 1.5Z" fill="currentColor"/>
      </svg>
      Fidelidade
    </div>
    <h1>Calculadora de<br><em>multa contratual</em></h1>
    <p class="subtitle">R$ 600,00 em 12 meses · R$ 50,00/mês</p>
  </div>

  <div class="card">
    <div class="fields">
      <div class="field">
        <label for="dtini">Data de início</label>
        <input type="date" id="dtini" />
      </div>
      <div class="field">
        <label for="dtcan">Data de cancelamento</label>
        <input type="date" id="dtcan" />
      </div>
    </div>

    <button class="btn" onclick="calcular()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="4" y="2" width="16" height="20" rx="2"/>
        <line x1="8" y1="10" x2="16" y2="10"/>
        <line x1="8" y1="14" x2="16" y2="14"/>
        <line x1="8" y1="18" x2="12" y2="18"/>
      </svg>
      Calcular multa
    </button>
  </div>

  <div id="resultado" style="display:none;">

    <div class="card">
      <div class="prog-header">
        <span class="prog-title">Progresso da fidelidade</span>
        <span id="pillStatus" class="pill"></span>
      </div>
      <div class="track">
        <div class="fill" id="progressBar" style="width:0%"></div>
      </div>
      <div class="prog-foot">
        <span id="progLabel">0 de 12 meses</span>
        <span id="progPct">0%</span>
      </div>
    </div>

    <div class="metrics">
      <div class="metric">
        <div class="metric-val" id="mUsados">—</div>
        <div class="metric-lbl">Utilizados</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="mRestantes">—</div>
        <div class="metric-lbl">Restantes</div>
      </div>
      <div class="metric">
        <div class="metric-val" id="dataFinal" style="font-size:16px; padding-top:4px;">—</div>
        <div class="metric-lbl">Fim da fidelidade</div>
      </div>
    </div>

    <div class="card multa-card" id="cardMulta">
      <div class="multa-top">
        <div>
          <p class="multa-lbl">Multa a cobrar</p>
          <p class="multa-val" id="multaVal"></p>
        </div>
        <div class="multa-icon" id="iconMulta">
          <svg id="iconSvg" width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
        </div>
      </div>
      <hr class="sep">
      <p class="multa-desc" id="descricao"></p>
    </div>

  </div>
</div>

<script>
  const pad = n => String(n).padStart(2,'0');
  const hoje = new Date();
  document.getElementById('dtcan').value = hoje.getFullYear()+'-'+pad(hoje.getMonth()+1)+'-'+pad(hoje.getDate());

  const VALOR_TOTAL = 600;
  const PERIODO = 12;
  const VALOR_MES = VALOR_TOTAL / PERIODO;

  function fmt(v){ return 'R$ ' + v.toFixed(2).replace('.',','); }
  function fmtData(d){ return d.toLocaleDateString('pt-BR'); }

  function calcular(){
    const migRaw = document.getElementById('dtini').value;
    const canRaw = document.getElementById('dtcan').value;
    if(!migRaw || !canRaw){ alert('Preencha as duas datas.'); return; }

    const mig = new Date(migRaw+'T00:00:00');
    const can = new Date(canRaw+'T00:00:00');
    if(can < mig){ alert('Cancelamento não pode ser anterior ao início.'); return; }

    // REGRA:
    // Início: se o dia for <= 15 → o mês de início conta; se dia > 15 → a fidelidade começa no mês seguinte.
    // Cancelamento: se o dia for >= 16 → mês do cancelamento conta; se dia <= 15 → só conta até o mês anterior.

    // Primeiro mês a contar:
    // dia <= 15 → mês da migração conta; dia > 15 → começa no mês seguinte
    let mesInicio = new Date(mig.getFullYear(), mig.getMonth(), 1);
    if (mig.getDate() > 15) {
      mesInicio.setMonth(mesInicio.getMonth() + 1);
    }

    // Último mês que conta como utilizado:
    // se dia de cancelamento >= 16 → mês do cancelamento conta
    // se dia de cancelamento <= 15 → só conta até o mês anterior
    let mesFim = new Date(can.getFullYear(), can.getMonth(), 1);
    if (can.getDate() <= 15) {
      mesFim.setMonth(mesFim.getMonth() - 1);
    }

    // Calcula meses utilizados (ambos os extremos inclusivos)
    let mesesUsados = 0;
    if (mesFim >= mesInicio) {
      mesesUsados = (mesFim.getFullYear() - mesInicio.getFullYear()) * 12
                  + (mesFim.getMonth() - mesInicio.getMonth())
                  + 1;
    }
    mesesUsados = Math.min(mesesUsados, PERIODO);

    // Fim da fidelidade: 12 meses a partir do mês de início
    const mesFinalFidelidade = new Date(mesInicio.getFullYear(), mesInicio.getMonth() + PERIODO - 1, 1);

    // Data exibida como "fim da fidelidade" (mesmo dia do início, no último mês)
    const ultimoDiaMesFinal = new Date(mesInicio.getFullYear(), mesInicio.getMonth() + PERIODO, 0).getDate();
    const diaFinal = Math.min(mig.getDate(), ultimoDiaMesFinal);
    const dataFinal = new Date(mesInicio.getFullYear(), mesInicio.getMonth() + PERIODO - 1, diaFinal);

    // Meses restantes = total - utilizados
    const mesesRestantes = Math.max(0, PERIODO - mesesUsados);

    const multa = mesesRestantes * VALOR_MES;
    const pct = Math.round((mesesUsados / PERIODO) * 100);
    const quitado = mesesRestantes === 0;

    document.getElementById('mUsados').textContent = mesesUsados;
    document.getElementById('mRestantes').textContent = mesesRestantes;
    document.getElementById('dataFinal').textContent = dataFinal.toLocaleDateString('pt-BR');

    const bar = document.getElementById('progressBar');
    bar.style.width = pct + '%';
    bar.className = 'fill' + (quitado ? ' fill--done' : '');

    document.getElementById('progLabel').textContent = mesesUsados + ' de ' + PERIODO + ' meses';
    document.getElementById('progPct').textContent = pct + '%';

    const pill = document.getElementById('pillStatus');
    if(quitado){
      pill.textContent = 'Fidelidade cumprida';
      pill.className = 'pill pill--done';
    } else {
      pill.textContent = 'Em aberto';
      pill.className = 'pill pill--open';
    }

    const multaValEl = document.getElementById('multaVal');
    const iconMulta  = document.getElementById('iconMulta');
    const iconSvg    = document.getElementById('iconSvg');
    const descEl     = document.getElementById('descricao');

    multaValEl.textContent = fmt(multa);

    if(quitado){
      multaValEl.className = 'multa-val multa-val--ok';
      iconMulta.className  = 'multa-icon multa-icon--ok';
      iconSvg.style.color  = '#0d7a56';
      iconSvg.innerHTML    = '<path d="M20 6L9 17l-5-5"/>';
      descEl.textContent   = 'O cliente completou os 12 meses de fidelidade. Não há multa a cobrar.';
    } else {
      multaValEl.className = 'multa-val multa-val--danger';
      iconMulta.className  = 'multa-icon multa-icon--danger';
      iconSvg.style.color  = '#f72b6a';
      iconSvg.innerHTML    = '<path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>';
      descEl.textContent   = 'Início em ' + fmtData(mig) + ' · Cancelamento em ' + fmtData(can) + ' · ' + mesesUsados + ' meses utilizados (início dia > 15 conta no mês seguinte; cancelamento dia ≤ 15 não conta o mês) · ' + mesesRestantes + ' × R$ 50,00 = ' + fmt(multa) + ' de multa.';
    }

    const resultado = document.getElementById('resultado');
    resultado.style.display = 'block';
    resultado.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
</script>
</body>
</html>
